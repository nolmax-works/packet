syntax = "proto3";

option java_package = "com.qtpc.tech.nolmax.proto";
option java_outer_classname = "ChatProtos";
option java_multiple_files = true;

package chat;

message ChatPacket {
  oneof payload {
    // authentication
    AuthRequest auth_request = 1;
    AuthResponse auth_response = 2;

    // conversation-related packets
    CreateConversationRequest create_conversation_request = 3;
    CreateConversationResponse create_conversation_response = 4;
    UpdateConversationAvatarRequest update_conversation_avatar_request = 5;
    UpdateConversationAvatarResponse update_conversation_avatar_response = 6;
    UpdateConversationNameRequest update_conversation_name_request = 7;
    UpdateConversationNameResponse update_conversation_name_response = 8;
    UpdateConversationLastMessageRequest update_conversation_last_message_request = 9;
    UpdateConversationLastMessageResponse update_conversation_last_message_response = 10;
    DeleteConversationRequest delete_conversation_request = 11;
    DeleteConversationResponse delete_conversation_response = 12;
    PullConversationsRequest pull_conversations_request = 13;
    PullConversationsResponse pull_conversations_response = 14;

    // message-related packets
    CreateMessageRequest create_message_request = 15;
    CreateMessageResponse create_message_response = 16;
    PullMessagesRequest pull_messages_request = 17;
    PullMessagesResponse pull_messages_response = 18;

    // participant-related packets
    JoinConversationRequest join_conversation_request = 19;
    JoinConversationResponse join_conversation_response = 20;
    LeaveConversationRequest leave_conversation_request = 21;
    LeaveConversationResponse leave_conversation_response = 22;
    UpdateParticipantRoleRequest update_participant_role_request = 23;
    UpdateParticipantRoleResponse update_participant_role_response = 24;
    UpdateLastReadMessageRequest update_last_read_message_request = 25;
    UpdateLastReadMessageResponse update_last_read_message_response = 26;
    PullParticipantsRequest pull_participants_request = 27;
    PullParticipantsResponse pull_participants_response = 28;
  }
}

// payloads for authenticaton
message AuthRequest {
  string token = 1;
}

message AuthResponse {
  int32 error_code = 1;
}

// payloads for conversation
enum ConversationType {
  PRIVATE = 0;
  GROUP = 1;
}

message Conversation {
  int64 id = 1;
  ConversationType type = 2;
  string name = 3;
  string avatar_url = 4;
  int64 created_by = 5;
  int64 update_id = 6;
  int64 last_message_id = 7;
}

message CreateConversationRequest {
  Conversation conversation = 1;
}

message CreateConversationResponse {
  int32 error_code = 1;
  bool success = 2;
  Conversation conversation = 3;
}

message UpdateConversationAvatarRequest {
  int64 id = 1;
  string avatar_url = 2;
}

message UpdateConversationAvatarResponse {
  int32 error_code = 1;
}

message UpdateConversationNameRequest {
  int64 id = 1;
  string name = 2;
}

message UpdateConversationNameResponse {
  int32 error_code = 1;
}

message UpdateConversationLastMessageRequest {
  int64 id = 1;
  int64 message_id = 2;
}

message UpdateConversationLastMessageResponse {
  int32 error_code = 1;
}

message DeleteConversationRequest {
  int64 id = 1;
}

message DeleteConversationResponse {
  int32 error_code = 1;
}

message PullConversationsRequest {
  int64 user_id = 1;
  int64 last_update_id = 2;
}

message PullConversationsResponse {
  int32 error_code = 1;
  repeated Conversation conversations = 2;
}

// payloads for messages
message Message {
  int64 id = 1;
  int64 conversation_id = 2;
  int64 sender_id = 3;
  string content = 4;
  string sent_at = 5;
}

message CreateMessageRequest {
  int64 conversation_id = 1;
  int64 sender_id = 2;
  string content = 3;
}

message CreateMessageResponse {
  int32 error_code = 1;
  Message message = 2;
}

message PullMessagesRequest {
  int64 conversation_id = 1;
  int64 last_update_id = 2;
}

message PullMessagesResponse {
  int32 error_code = 1;
  repeated Message messages = 2;
}

// payloads for participants
enum ParticipantRole {
  MEMBER = 0;
  ADMIN = 1;
}

message Participant {
  int64 conversation_id = 1;
  int64 user_id = 2;
  ParticipantRole role = 3;
  string joined_at = 4;
  string left_at = 5;
  int64 last_read_message_id = 6;
  int64 update_id = 7;
}

message JoinConversationRequest {
  int64 conversation_id = 1;
  int64 user_id = 2;
  ParticipantRole role = 3;
}

message JoinConversationResponse {
  int32 error_code = 1;
}

message LeaveConversationRequest {
  int64 conversation_id = 1;
  int64 user_id = 2;
}

message LeaveConversationResponse {
  int32 error_code = 1;
}

message UpdateParticipantRoleRequest {
  int64 conversation_id = 1;
  int64 user_id = 2;
  ParticipantRole role = 3;
}

message UpdateParticipantRoleResponse {
  int32 error_code = 1;
}

message UpdateLastReadMessageRequest {
  int64 conversation_id = 1;
  int64 user_id = 2;
  int64 message_id = 3;
}

message UpdateLastReadMessageResponse {
  int32 error_code = 1;
}

message PullParticipantsRequest {
  int64 conversation_id = 1;
  int64 last_update_id = 2;
}

message PullParticipantsResponse {
  int32 error_code = 1;
  repeated Participant participants = 2;
}