syntax = "proto3";
import "google/protobuf/timestamp.proto";

option java_package = "com.qtpc.tech.nolmax.proto";
option java_outer_classname = "ChatProtos";
option java_multiple_files = true;

package chat;

message ChatPacket {
  oneof payload {
    // authentication
    AuthRequest auth_request = 1;
    AuthResponse auth_response = 2;

    // conversation-related packets
    CreateConversationRequest create_conversation_request = 3;
    CreateConversationResponse create_conversation_response = 4;
    UpdateConversationAvatarRequest update_conversation_avatar_request = 5;
    UpdateConversationAvatarResponse update_conversation_avatar_response = 6;
    UpdateConversationNameRequest update_conversation_name_request = 7;
    UpdateConversationNameResponse update_conversation_name_response = 8;
    DeleteConversationRequest delete_conversation_request = 9;
    DeleteConversationResponse delete_conversation_response = 10;
    PullConversationsRequest pull_conversations_request = 11;
    PullConversationsResponse pull_conversations_response = 12;
    UpdateBroadcastConversation update_broadcast_conversation = 13;

    // message-related packets
    CreateMessageRequest create_message_request = 14;
    CreateMessageResponse create_message_response = 15;
    PullMessagesRequest pull_messages_request = 16;
    PullMessagesResponse pull_messages_response = 17;
    PullUpdateComboRequest pull_update_combo_request = 18;
    PullUpdateComboResponse pull_update_combo_response = 19;
    BroadcastMessageOnline broadcast_message_online = 20;

    // participant-related packets
    JoinConversationRequest join_conversation_request = 21;
    JoinConversationResponse join_conversation_response = 22;
    LeaveConversationRequest leave_conversation_request = 23;
    LeaveConversationResponse leave_conversation_response = 24;
    UpdateParticipantRoleRequest update_participant_role_request = 25;
    UpdateParticipantRoleResponse update_participant_role_response = 26;
    PullParticipantsRequest pull_participants_request = 27;
    PullParticipantsResponse pull_participants_response = 28;
    UpdateBroadcastParticipant update_broadcast_participant = 29;

    // user-related packets
    UpdateUserAvatarRequest update_user_avatar_request = 30;
    UpdateUserAvatarResponse update_user_avatar_response = 31;
    PullUsersRequest pull_users_request = 32;
    PullUsersResponse pull_users_response = 33;
    LogoutRequest logout_request = 34;
    LogoutResponse logout_response = 35;
    UpdateBroadcastUser update_broadcast_user = 36;
  }
}

// payloads for authenticaton
message AuthRequest {
  string token = 1;
}

message AuthResponse {
  int32 error_code = 1;
}

// payloads for conversation
enum ConversationType {
  PRIVATE = 0;
  GROUP = 1;
}

message Conversation {
  int64 id = 1;
  ConversationType type = 2;
  string name = 3;
  string avatar_url = 4;
  int64 created_by = 5;
  int64 update_id = 6;
  int64 last_message_id = 7;
}

message CreateConversationRequest {
  Conversation conversation = 1;
}

message CreateConversationResponse {
  int32 error_code = 1;
  Conversation conversation = 2;
}

message UpdateConversationAvatarRequest {
  int64 id = 1;
  string avatar_url = 2;
}

message UpdateConversationAvatarResponse {
  int32 error_code = 1;
}

message UpdateConversationNameRequest {
  int64 id = 1;
  string name = 2;
}

message UpdateConversationNameResponse {
  int32 error_code = 1;
}

message DeleteConversationRequest {
  int64 id = 1;
}

message DeleteConversationResponse {
  int32 error_code = 1;
}

message PullConversationsRequest {
  int64 user_id = 1;
  int64 last_update_id = 2;
}

message PullConversationsResponse {
  int32 error_code = 1;
  repeated Conversation conversations = 2;
}

message PullUpdateComboRequest {
  int64 last_update_id = 1;
}

message PullUpdateComboResponse {
  int32 error_code = 1;
  repeated Message messages = 2;
  repeated Participant participants = 3;
  repeated User users = 4;
  repeated Conversation conversations = 5;
}

message UpdateBroadcastConversation {
  Conversation conversation = 1;
}

// payloads for messages
message Message {
  int64 id = 1;
  int64 conversation_id = 2;
  int64 sender_id = 3;
  string content = 4;
  google.protobuf.Timestamp sent_at = 5;
}

message CreateMessageRequest {
  int64 conversation_id = 1;
  string content = 2;
}

message CreateMessageResponse {
  int32 error_code = 1;
  Message message = 2;
}

message PullMessagesRequest {
  int64 conversation_id = 1;
  int64 last_update_id = 2;
}

message PullMessagesResponse {
  int32 error_code = 1;
  repeated Message messages = 2;
}

message BroadcastMessageOnline {
  Message message = 1;
}

// payloads for participants
enum ParticipantRole {
  MEMBER = 0;
  ADMIN = 1;
}

message Participant {
  int64 conversation_id = 1;
  int64 user_id = 2;
  ParticipantRole role = 3;
  google.protobuf.Timestamp joined_at = 4;
  google.protobuf.Timestamp left_at = 5;
  int64 last_read_message_id = 6;
  int64 update_id = 7;
}

message JoinConversationRequest {
  int64 conversation_id = 1;
  int64 user_id = 2;
  ParticipantRole role = 3;
}

message JoinConversationResponse {
  int32 error_code = 1;
}

message LeaveConversationRequest {
  int64 conversation_id = 1;
  int64 user_id = 2;
}

message LeaveConversationResponse {
  int32 error_code = 1;
}

message UpdateParticipantRoleRequest {
  int64 conversation_id = 1;
  int64 user_id = 2;
  ParticipantRole role = 3;
}

message UpdateParticipantRoleResponse {
  int32 error_code = 1;
}

message PullParticipantsRequest {
  int64 conversation_id = 1;
  int64 last_update_id = 2;
}

message PullParticipantsResponse {
  int32 error_code = 1;
  repeated Participant participants = 2;
}

message UpdateBroadcastParticipant {
  int32 action = 1; // 0 for deletion, 1 for addition, 2 for updating role
  Participant participant = 2;
}

// payloads for user (excluding register and token request as it is handled by authAPI)
message User {
  int64 id = 1;
  string username = 2;
  string avatar_url = 3;
  int64 update_id = 4;
}

message UpdateUserAvatarRequest {
  int64 id = 1;
  string avatar_url = 2;
}

message UpdateUserAvatarResponse {
  int32 error_code = 1;
}

message PullUsersRequest {
  int64 conversation_id = 1;
  int64 last_update_id = 2;
}

message PullUsersResponse {
  int32 error_code = 1;
  repeated User users = 2;
}

message UpdateBroadcastUser {
  User user = 1;
}

message LogoutRequest {} // blank packet

message LogoutResponse {
  int32 error_code = 1;
}